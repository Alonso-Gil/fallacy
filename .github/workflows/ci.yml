# Checks formatting, compilation, types, and lint on each PR and on pushes to main.
# In GitHub: Settings -> Branches -> protect main and mark this workflow as a required check.

name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Format, compile, types, lint, tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Prettier (check)
        run: yarn check-format

      - name: Compile
        run: yarn compile

      - name: TypeScript (check)
        run: yarn check-types

      - name: ESLint (check)
        run: yarn lint:ci

      - name: Tests
        run: yarn test
